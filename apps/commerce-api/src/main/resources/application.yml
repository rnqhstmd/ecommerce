server:
  shutdown: graceful
  tomcat:
    threads:
      max: 200 # 최대 워커 스레드 수 (default : 200)
      min-spare: 10 # 최소 유지 스레드 수 (default : 10)
    connection-timeout: 1m # 연결 타임아웃 (ms) (default : 60000ms = 1m)
    max-connections: 8192 # 최대 동시 연결 수 (default : 8192)
    accept-count: 100 # 대기 큐 크기 (default : 100)
    keep-alive-timeout: 60s # 60s
  max-http-request-header-size: 8KB

spring:
  main:
    web-application-type: servlet
  application:
    name: commerce-api
  profiles:
    active: local
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import:
      - jpa.yml
      - kafka.yml
      - redis.yml
      - logging.yml
      - monitoring.yml

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

coupon:
  lock:
    wait-time-seconds: 3
    lease-time-seconds: 60

rate-limit:
  enabled: true
  max-requests: 60
  window-seconds: 60

resilience4j:
  circuitbreaker:
    instances:
      kafkaPublisher:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      redisRetry:
        max-attempts: 3
        wait-duration: 500ms

springdoc:
  use-fqn: true
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: local, test

rate-limit:
  enabled: false

---
spring:
  config:
    activate:
      on-profile: dev

cache:
  redis:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: qa

cache:
  redis:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: prd

cache:
  redis:
    enabled: true

springdoc:
  api-docs:
    enabled: false